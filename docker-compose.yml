version: '3.8'

services:
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: gaji-backend
    environment:
      - NODE_ENV=production
      - PORT=5000
      - JWT_SECRET=${JWT_SECRET:-your_jwt_secret_key_change_this}
    ports:
      - "5000:5000"
    volumes:
      - ./server/data:/app/data
    restart: unless-stopped
    networks:
      - gaji-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL=http://localhost:5000/api
    container_name: gaji-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - gaji-network

  nginx:
    image: nginx:alpine
    container_name: gaji-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
    networks:
      - gaji-network

networks:
  gaji-network:
    driver: bridge

volumes:
  data:
